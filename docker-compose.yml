version: "3.8"

services:
  noc-dashboard:
    image: noc-dashboard:latest
    build: .
    container_name: noc-dashboard
    restart: unless-stopped
    ports:
      - "8081:8081"
    volumes:
      # Persistent layout + trend state
      - ./state:/app/state
      # Override dashboard config at runtime without rebuild
      - ./dashboard.yaml:/app/dashboard.yaml:ro
      # Override themes at runtime without rebuild
      - ./themes:/app/themes:ro
    env_file:
      - .env
    environment:
      - PORT=8081
      - WORKERS=2
