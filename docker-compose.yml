version: "3.8"

services:
  noc-dashboard:
    image: noc-dashboard:latest
    build: .
    container_name: noc-dashboard
    restart: unless-stopped
    ports:
      - "${NOC_PORT:-8081}:8081"
    volumes:
      - noc_state:/app/state
    environment:
      - PORT=8081
      - WORKERS=2

volumes:
  noc_state:
